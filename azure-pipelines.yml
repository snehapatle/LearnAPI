trigger: 
- main
pool: 
  name: Default

steps:
- checkout : self

- script : echo "Pipeline Start"
  displayName : Start Pipeline

- script : dotnet restore
  displayName : Restore Packages

- script : dotnet build --configuration Release
  displayName : Build Application 

- script : dotnet test --no-build
  displayName: Run Unit Tests

- script : dotnet publish UseAppSettings/UseAppSettings.csproj --configuration Release --output $(Build.ArtifactStagingDirectory)
  displayName: Publish Application

- task : PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'drop'
    publishLocation: 'Container'

- script : dotnet --info
  displayName: Display .Net Information


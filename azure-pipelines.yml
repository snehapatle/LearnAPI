trigger: 
- main
pool: 
  name: Default

steps:
- checkout : self

- task : UseDotNet@2
  inputs : 
    packageType : sdk
    version : '8.0.x'

- script : echo "Pipeline Start"
  displayName : Start Pipeline

- script : dotnet restore
  displayName : Restore Packages

- script : dotnet build --configuration Release
  displayName : Build Application 

- script : dotnet --info
  displayName: Display .Net Information

